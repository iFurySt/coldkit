name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Test
        run: go test ./...

      - name: Build
        run: make build

      - name: Build npm platform packages
        run: npm run build:npm-platform-packages

      - name: Check npm platform packages
        run: |
          for package_dir in npm/dist-packages/@ifuryst/*; do
            npm pack --dry-run "$package_dir"
          done

      - name: Check npm package
        run: npm pack --dry-run
